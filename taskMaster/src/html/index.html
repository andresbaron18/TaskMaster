<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskMaster</title>
    <meta name="description" content="TaskMaster es una herramienta digital que te ayuda a organizar,
    planificar y controlar todas las tareas y actividades necesarias para llevar a cabo un proyecto
    de manera eficiente">
    <meta name="keywords" content="Gestion, proyectos, TaskMaster">
    <link rel="shortcut icon" href="img/logonew.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo-section">
                <a href="HTML/login.html">
                    <img class="logo" src="img/name-logonew.png" alt="TaskMaster Logo">
                </a>
            </div>
            <div class="login-content">
                <h1 class="login-title">Acceso</h1>
                <p class="login-subtitle">Bienvenido, introduce tus credenciales para comenzar</p>
                <form class="login-form">
                    <div class="form-group">
                        <label class="form-label" for="email">E-mail:</label>
                        <input class="form-input" type="email" id="email" name="email" required placeholder="tu@email.com">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="password">Contraseña:</label>
                        <input class="form-input" type="password" id="password" name="password" required placeholder="••••••••">
                    </div>
                    <div class="form-links">
                        <a href="#" id="recover" class="link">Recuperar contraseña</a>
                        <a href="#" id="create" class="link">Crear Cuenta</a>
                    </div>
                    <button type="submit" id="login" class="btn-login">Iniciar sesión</button>
                </form>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>&copy; 2024 - TaskMaster</p>
    </footer>
    <script src="index.js"></script>
</body>
</html>
