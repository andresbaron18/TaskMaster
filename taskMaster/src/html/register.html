<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskMaster - Registro</title>
    <meta name="description" content="Regístrate en TaskMaster para gestionar tus proyectos de manera eficiente">
    <link rel="shortcut icon" href="../../img/logonew.png">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo-section">
                <a href="index.html">
                    <img class="logo" src="../../img/name-logonew.png" alt="TaskMaster Logo">
                </a>
            </div>
            <div class="login-content">
                <h1 class="login-title">Registro</h1>
                <p class="login-subtitle">Únete a TaskMaster y comienza a gestionar tus proyectos</p>
                <form class="login-form">
                    <div class="form-group">
                        <label class="form-label" for="nombre">Nombre completo:</label>
                        <input class="form-input" type="text" id="nombre" name="nombre" required placeholder="Tu nombre completo">
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="rol">Rol:</label>
                        <select class="form-input" id="rol" name="rol">
                            <option value="administrador">Administrador</option>
                            <option value="Gestor">Gestor</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="email">Correo electrónico:</label>
                        <input class="form-input" type="email" id="email" name="email" required placeholder="tu@email.com">
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="password">Contraseña:</label>
                        <input class="form-input" type="password" id="password" name="password" required placeholder="••••••••">
                    </div>

                    <button type="submit" id="registro" class="btn-login">Registrarse</button>

                    <div class="form-links" style="justify-content: center; margin-top: 20px;">
                        <a href="index.html" id="inicioSesion" class="link">¿Ya tienes una cuenta? Iniciar Sesión</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>&copy; 2024 - TaskMaster</p>
    </footer>
    <script src="../js/register.js"></script>
</body>
</html>
