<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskMaster - Recuperar Contraseña</title>
    <meta name="description" content="Recupera tu contraseña de TaskMaster de forma segura">
    <link rel="shortcut icon" href="../../img/logonew.png">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo-section">
                <a href="index.html">
                    <img class="logo" src="../../img/name-logonew.png" alt="TaskMaster Logo">
                </a>
            </div>
            <div class="login-content">
                <h1 class="login-title">Recuperar Contraseña</h1>
                <p class="login-subtitle">Introduce tu nueva contraseña para continuar</p>
                <form class="login-form">
                    <div class="form-group">
                        <label class="form-label" for="email">E-mail:</label>
                        <input class="form-input" type="email" id="email" name="email" required placeholder="tu@email.com">
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="password">Nueva contraseña:</label>
                        <input class="form-input" type="password" id="password" name="password" required placeholder="••••••••">
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="confirm-password">Confirmar contraseña:</label>
                        <input class="form-input" type="password" id="confirm-password" name="confirm-password" required placeholder="••••••••">
                    </div>

                    <button type="submit" class="btn-login">Enviar correo</button>

                    <div class="form-links" style="justify-content: center; margin-top: 20px;">
                        <a href="index.html" class="link">Volver al inicio de sesión</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>&copy; 2024 - TaskMaster</p>
    </footer>
    <script src="../js/password.js"></script>
</body>
</html>
